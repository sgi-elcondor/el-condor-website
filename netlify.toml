# Configuración de Netlify — sitio estático servido desde la raíz del repo.
# Netlify ya sirve URLs limpias (empresa.html se entrega en /empresa).
# Estas reglas redirigen (301) las rutas antiguas con .html a su versión limpia,
# para no tener contenido duplicado y conservar el SEO de enlaces ya indexados.
# La query string (?id=...) se conserva automáticamente en la redirección.

[build]
  publish = "."

# Caché de assets. IMPORTANTE: los nombres de archivo NO llevan hash de versión,
# así que un asset reemplazado conserva su nombre. Por eso CSS/JS se revalidan
# siempre (ETag → 304 barato) y las imágenes caducan en 1 día, en vez de quedar
# "congeladas". Las fuentes (Font Awesome) sí son inmutables: nunca cambian.
# Para forzar refresco inmediato tras un cambio, versiona la URL (style.css?v=N).
[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/empresa.html"
  to = "/empresa"
  status = 301
  force = true

[[redirects]]
  from = "/proyectos.html"
  to = "/proyectos"
  status = 301
  force = true

[[redirects]]
  from = "/proyecto.html"
  to = "/proyecto"
  status = 301
  force = true

[[redirects]]
  from = "/simulador.html"
  to = "/simulador"
  status = 301
  force = true

[[redirects]]
  from = "/contacto.html"
  to = "/contacto"
  status = 301
  force = true
